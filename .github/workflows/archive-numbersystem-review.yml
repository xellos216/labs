name: Archive Numbersystem Review Update

on:
  push:
    branches:
      - archive-numbersystem

permissions:
  contents: write

jobs:
  apply-reviewed-answers:
    if: github.event.head_commit.message == 'Bootstrap numbersystem review update'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout review branch
        uses: actions/checkout@v4
        with:
          ref: archive-numbersystem
          fetch-depth: 0

      - name: Fill reviewed QA answers
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          reviewed_answers = {
              "archive/numbersystem/phase01/01_binary_hex_byte_recognition.md": [
                  "Hexadecimal is commonly used because one hexadecimal digit represents four bits, so two hexadecimal digits represent exactly one byte. It is more compact and readable than binary while preserving byte boundaries.",
                  "One hexadecimal digit represents 4 bits.",
                  "`0xff` is 8 bits or 1 byte, `0xffff` is 16 bits or 2 bytes, and `0xffffffff` is 32 bits or 4 bytes.",
                  "The left-side value represents the byte offset from the beginning of the input or file.",
                  "`0x00` appears as `.` because it is a non-printable NUL byte, and `xxd` uses `.` as a placeholder for non-printable bytes in the ASCII area.",
                  "The character `'0'` is the printable ASCII byte `0x30`, while `0x00` is the non-printable NUL byte. They are different byte values with different meanings.",
                  "`\"0a\"` consists of two printable characters stored as the bytes `0x30 0x61`, while `0x0a` is one non-printable LF/newline byte.",
                  "The dump contains two visible character `'0'` bytes, one newline byte, and one NUL byte.",
              ],
              "archive/numbersystem/phase01/02_octal_permissions_number_representations.md": [
                  "Unix permission notation fits naturally with octal because each permission group contains three bits—read, write, and execute—and one octal digit represents exactly three bits.",
                  "`755` represents `rwxr-xr-x`, `644` represents `rw-r--r--`, `600` represents `rw-------`, and `700` represents `rwx------`.",
                  "The first character represents the file type. In `-rwxr-xr-x`, `-` means a regular file.",
                  "For a regular file, `x` means the file may be executed. For a directory, `x` means the directory may be entered, searched, or traversed.",
                  "`cat file.txt` works because the `cat` program only needs read permission on `file.txt`. Running `./file.txt` treats the file as an execution target and therefore requires execute permission.",
                  "`chmod 755 file.txt` grants execute permission, so the permission error may disappear. However, execution can still fail if the file content is not a valid executable format or does not contain a usable interpreter directive such as a shebang.",
                  "`ls dir` failed because the directory did not have read permission. Directory read permission is required to list the names of entries inside it.",
                  "`cat dir/inside.txt` succeeded because directory execute permission allowed traversal of the known path, and `inside.txt` itself was readable. Directory read permission was not required because the filename was already known.",
                  "With `d--x------`, the owner can enter or traverse the directory and access an already known filename if the target file permissions allow it. The directory contents cannot be listed because read permission is absent.",
                  "An exit status is evidence of the result because it is produced after the command finishes and summarizes success or failure. It does not itself cause the outcome; the underlying permission check, missing command, or execution error causes it.",
              ],
              "archive/numbersystem/phase01/03_signed_unsigned_twos_complement.md": [
                  "The same bit pattern can have different numeric meanings because the stored bits are interpreted according to the integer width and whether the type is signed or unsigned.",
                  "As an unsigned 8-bit value, `0xff` means `255`. As a signed 8-bit two's complement value, it means `-1`.",
                  "`0x7f` is the maximum signed 8-bit value because its bit pattern is `01111111`: the sign bit is `0`, and all seven remaining value bits are `1`, giving `127`.",
                  "`0x80` is the minimum signed 8-bit value because its bit pattern is `10000000`, which represents `-128` in 8-bit two's complement.",
                  "`value & 0xff` keeps only the lowest 8 bits of `value`. It was useful in Python because Python integers do not wrap automatically to 8 bits, so the mask simulated fixed-width 8-bit behavior.",
                  "The `signed8` function first keeps the low 8 bits. If the value is at least `0x80`, it subtracts `0x100`, converting the unsigned range `128–255` into the signed range `-128–-1`.",
                  "As an unsigned 32-bit value, `0xffffffff` means `4294967295`. As a signed 32-bit two's complement value, it means `-1`.",
                  "`0xffffffff` should not be interpreted immediately as only `4294967295` because its meaning depends on the integer width, signedness, and usage context. In 32 bits, it can mean unsigned `4294967295`, signed `-1`, or an all-bits-set mask.",
                  "`0xff` is all eight bits set in one byte, while `0xffffffff` is all 32 bits set in four bytes. Both represent the all-bits-set pattern for their respective widths.",
                  "C requires extra caution because unsigned overflow has defined modulo wraparound behavior, while signed overflow is undefined behavior. Therefore, signed overflow cannot safely be assumed to wrap to the opposite end of the range.",
              ],
              "archive/numbersystem/phase01/04_bitwise_operations_masks_flags_endianness.md": [
                  "A mask is a bit pattern that selects which bit positions should be tested, preserved, enabled, cleared, or toggled.",
                  "`value & mask` keeps or tests the selected bits, `value | mask` enables the selected bits, and `value ^ mask` toggles the selected bits.",
                  "Unix permissions can be represented as bit flags because `r`, `w`, and `x` are independent yes/no states. They map to the three bits `100`, `010`, and `001`, with numeric values `4`, `2`, and `1`.",
                  "If `perm & flag` produces a non-zero result, the flag is set. If it produces zero, the flag is not set.",
                  "Enable a flag with `value | flag`, clear it with `value & ~flag`, and toggle it with `value ^ flag`.",
                  "`1` is `00000001` in an 8-bit view. Shifting it left by seven positions produces `10000000`, which is `0x80`.",
                  "Python prints `0b10` instead of `0b010` because leading zeroes are not part of the numeric value, and `bin()` returns the shortest binary representation.",
                  "A byte sequence shows the bytes in storage order, while an integer value is the numeric result of interpreting those bytes according to a width and byte-order rule.",
                  "Little-endian interpretation produces `0x12345678` because the first byte, `0x78`, is treated as the least significant byte, followed by `0x56`, `0x34`, and `0x12` as increasingly significant bytes.",
                  "Endianness is described as byte order because it determines the order of bytes in a multi-byte value. It does not reverse the bit order inside each byte.",
              ],
              "archive/numbersystem/phase01/05_hex_dumps_magic_values_addresses_systems_review.md": [
                  "The offset shows the position from the beginning of the data, the byte column shows the actual stored bytes, and the ASCII view shows a printable interpretation of those bytes.",
                  "`7f45 4c46` should be split into `7f 45 4c 46` because two hexadecimal digits represent one byte. The visual grouping in `xxd` does not change the actual byte boundaries.",
                  "`7f 45 4c 46` appears as `.ELF` because `0x7f` is a non-printable byte displayed as `.`, while `0x45`, `0x4c`, and `0x46` are interpreted as the printable ASCII characters `E`, `L`, and `F`.",
                  "`0x41414141` suggests the ASCII filler pattern `AAAA` because each byte `0x41` represents the character `A`.",
                  "Depending on context, `0x00000000` can mean integer zero, a null pointer, cleared memory, or an empty field.",
                  "`0xffffffff` contains 32 bits all set to `1`. Interpreted as an unsigned 32-bit integer, it is `4294967295`; interpreted as a signed 32-bit two's complement integer, it is `-1`.",
                  "`de ad be ef` is the big-endian byte order of `0xdeadbeef`, while `ef be ad de` is the little-endian byte order of the same value.",
                  "`r-xp` means the region is readable, executable, not writable, and privately mapped.",
                  "`/bin/cat` at the end of the mapping line indicates that the memory region is backed by that file rather than being anonymous memory.",
                  "One file can appear as multiple memory mappings because different segments of the file are mapped separately, each with its own permissions and file offset.",
              ],
          }

          answer_block = re.compile(
              r"(<details>\n<summary>A</summary>\n)\n(</details>)"
          )

          for file_name, answers in reviewed_answers.items():
              file_path = Path(file_name)
              original = file_path.read_text(encoding="utf-8")
              prefix, marker, review = original.partition("## Review Questions")
              if not marker:
                  raise RuntimeError(f"Review Questions section not found: {file_name}")

              answer_iter = iter(answers)

              def fill_answer(match: re.Match[str]) -> str:
                  try:
                      answer = next(answer_iter)
                  except StopIteration as exc:
                      raise RuntimeError(f"Too many blank answer blocks: {file_name}") from exc
                  return f"{match.group(1)}\n{answer}\n\n{match.group(2)}"

              updated_review, count = answer_block.subn(fill_answer, review)
              if count != len(answers):
                  raise RuntimeError(
                      f"Expected {len(answers)} answer blocks in {file_name}, found {count}"
                  )
              try:
                  next(answer_iter)
              except StopIteration:
                  pass
              else:
                  raise RuntimeError(f"Unused answers remain: {file_name}")

              file_path.write_text(
                  prefix + marker + updated_review,
                  encoding="utf-8",
                  newline="\n",
              )

          Path(".github/workflows/archive-numbersystem-review.yml").unlink()
          PY

      - name: Commit reviewed archives
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            archive/numbersystem/phase01/01_binary_hex_byte_recognition.md \
            archive/numbersystem/phase01/02_octal_permissions_number_representations.md \
            archive/numbersystem/phase01/03_signed_unsigned_twos_complement.md \
            archive/numbersystem/phase01/04_bitwise_operations_masks_flags_endianness.md \
            archive/numbersystem/phase01/05_hex_dumps_magic_values_addresses_systems_review.md \
            .github/workflows/archive-numbersystem-review.yml
          git diff --cached --check
          git commit -m "Fill numbersystem phase 01 review answers"
          git push origin archive-numbersystem
