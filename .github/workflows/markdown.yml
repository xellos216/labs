name: Markdown

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  markdownlint:
    name: markdownlint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint Markdown
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          globs: |
            README.md
            AGENTS.md
            LICENSE.md
            THIRD_PARTY_NOTICES.md
            active/**/*.md
            backlog/**/*.md
            archive/**/*.md
            docs/labs/**/*.md
